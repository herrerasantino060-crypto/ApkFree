<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APK Download Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        header {
            background-color: #4CAF50;
            color: white;
            padding: 10px 0;
            text-align: center;
        }
        .container {
            width: 80%;
            margin: 20px auto;
            padding: 20px;
            background: white;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        input[type='text'] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .apk-list {
            list-style-type: none;
            padding: 0;
        }
        .apk-list li {
            background: #e4e4e4;
            margin: 10px 0;
            padding: 15px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
        }
        .download-button {
            background: #4CAF50;
            color: white;
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 4px;
        }
        .download-button:hover {
            background: #45a049;
        }
    </style>
</head>
<body>
    <header>
        <h1>APK Download Page</h1>
    </header>
    <div class="container">
        <input type="text" id="search" placeholder="Search APKs..." onkeyup="searchAPKs()">
        <ul class="apk-list" id="apkList">
            <li>APK Name 1 <a class="download-button" href="#">Download</a></li>
            <li>APK Name 2 <a class="download-button" href="#">Download</a></li>
            <li>APK Name 3 <a class="download-button" href="#">Download</a></li>
            <li>APK Name 4 <a class="download-button" href="#">Download</a></li>
            <li>APK Name 5 <a class="download-button" href="#">Download</a></li>
        </ul>
    </div>
    <script>
        function searchAPKs() {
            const input = document.getElementById('search');
            const filter = input.value.toUpperCase();
            const ul = document.getElementById("apkList");
            const li = ul.getElementsByTagName('li');

            for (let i = 0; i < li.length; i++) {
                const txtValue = li[i].textContent || li[i].innerText;
                li[i].style.display = txtValue.toUpperCase().indexOf(filter) > -1 ? '' : 'none';
            }
        }
    </script>
</body>
</html>
